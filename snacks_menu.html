<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snacks — Menu de la friterie</title>
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>

<div class="page">

  <header class="site-header">
    <div class="header-top">
      <div class="brand">
        <span class="tag" data-i18n="tag">Snacks</span>
        <p class="tagline" data-i18n="tagline">Menu complet de la friterie — photo, prix et description pour chaque article</p>
      </div>
      <div class="lang-switch">
        <button type="button" data-lang="fr">FR</button>
        <button type="button" data-lang="en">EN</button>
        <button type="button" data-lang="de">DE</button>
      </div>
    </div>

    <div class="filters">
      <button type="button" class="filters-toggle" id="filters-toggle" aria-expanded="false" aria-controls="filters-panel">
        <span data-i18n="filtersButton">Filtres</span>
        <span class="filter-count" id="filter-count" hidden></span>
      </button>

      <div class="filters-panel" id="filters-panel">
        <div class="filter-group">
          <span class="filter-group-label" data-i18n="categoryLabel">Catégorie</span>
          <div class="chip-row" id="category-tabs"></div>
        </div>
        <div class="filter-group">
          <span class="filter-group-label" data-i18n="meatLabel">Viande</span>
          <div class="chip-row" id="meat-chips"></div>
        </div>
        <div class="reset-row">
          <button type="button" class="reset-button" id="reset-filters" data-i18n="resetButton">Réinitialiser</button>
        </div>
      </div>
    </div>
  </header>

  <div id="grid"></div>

  <p class="empty-state" id="empty-state" data-i18n="noResults" hidden></p>

  <div class="note" data-i18n="note"></div>

</div>

<script src="assets/data.js" defer></script>
<script src="assets/i18n.js" defer></script>
<script src="assets/app.js" defer></script>

</body>
</html>
